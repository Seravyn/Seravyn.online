<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>seravyn - maintenance</title>
    <link rel="icon" href="assets/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: rgb(15, 15, 15);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .title span {
            color: #C080FF;
        }

        .subtitle {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 30px;
        }

        .subtitle a {
            color: #ffffff;
            text-decoration: none;
            border-bottom: 1px solid #ffffff;
            transition: opacity 0.2s;
        }

        .subtitle a:hover {
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            .discord-icon {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="title">Seravyn is under <span>maintenance</span></h1>
        <p class="subtitle">A website rework is coming soon!</p>
    </div>
</body>
</html>
