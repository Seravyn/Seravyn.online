<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>seravyn-os terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height:100vh; width:100vw; overflow:hidden;
      font-family:"Fira Code","Ubuntu Mono",monospace;
      color:#e5e9f0;
    }

    .desktop {
      position:relative; height:100%; width:100%;
      background:#050816;
      background-image:url("background.jpg"); /* change if needed */
      background-position:center;
      background-size:cover;
      background-repeat:no-repeat;
    }

    .desktop::before {
      content:""; position:absolute; inset:0;
      background:radial-gradient(circle at top,rgba(0,0,0,0.1),rgba(0,0,0,0.8));
      mix-blend-mode:multiply;
    }

    .terminal-window, .snake-window {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:min(900px,90vw);
      background:rgba(15,23,42,0.9);
      border-radius:10px;
      box-shadow:0 20px 40px rgba(0,0,0,0.6);
      overflow:hidden;
      backdrop-filter:blur(4px);
      display:flex; flex-direction:column;
      border:1px solid rgba(148,163,184,0.4);
    }

    .terminal-window { height:min(420px,65vh); }
    .snake-window { height:min(480px,70vh); display:none; }

    .window-header {
      display:flex; align-items:center;
      padding:8px 12px;
      background:rgba(15,23,42,0.97);
      border-bottom:1px solid rgba(148,163,184,0.35);
    }

    .traffic-lights { display:flex; gap:6px; margin-right:10px; }
    .traffic-lights span {
      width:10px; height:10px; border-radius:50%; display:inline-block;
    }
    .red{background:#ef4444;} .yellow{background:#facc15;} .green{background:#22c55e;}

    .window-title { font-size:0.85rem; color:#9ca3af; }

    .terminal-body {
      flex:1; padding:12px 14px;
      font-size:0.9rem; line-height:1.4;
      overflow-y:auto;
      background:radial-gradient(circle at top left,rgba(56,189,248,0.08),transparent 55%),
                 radial-gradient(circle at bottom right,rgba(129,140,248,0.12),transparent 60%);
    }

    .line { white-space:pre-wrap; word-break:break-word; }

    .prompt-line { display:flex; align-items:center; margin-top:4px; }

    .prompt-label { margin-right:6px; }

    #terminal-input {
      flex:1; background:transparent; border:none; outline:none;
      color:#e5e9f0; font:inherit;
    }

    .hint { font-size:0.8rem; color:#9ca3af; margin-top:6px; }

    .palette { display:flex; gap:6px; margin-top:8px; }
    .palette span { width:26px; height:12px; border-radius:2px; }

    .p1{background:#3b82f6;} .p2{background:#22c55e;} .p3{background:#eab308;}
    .p4{background:#ec4899;} .p5{background:#8b5cf6;} .p6{background:#0ea5e9;}
    .p7{background:#f97316;} .p8{background:#ef4444;}

    /* Snake window content */
    .snake-body {
      flex:1;
      display:flex;
      flex-direction:column;
      padding:10px;
      gap:8px;
      background:radial-gradient(circle at top left,rgba(56,189,248,0.08),transparent 55%),
                 radial-gradient(circle at bottom right,rgba(129,140,248,0.12),transparent 60%);
    }

    .snake-info {
      font-size:0.85rem;
      color:#e5e7eb;
    }

    .snake-info span.key {
      padding:1px 4px;
      border-radius:3px;
      border:1px solid rgba(148,163,184,0.6);
      margin:0 2px;
      font-size:0.8rem;
    }

    #snake-canvas {
      background:#020617;
      border-radius:6px;
      border:1px solid rgba(148,163,184,0.6);
      margin:auto;
      image-rendering:pixelated;
    }

    .snake-footer {
      font-size:0.8rem;
      color:#9ca3af;
      text-align:center;
      padding-top:4px;
    }

    @media (max-width:600px){
      .terminal-window{height:70vh;}
      .snake-window{height:75vh;}
      .terminal-body{font-size:0.85rem;}
    }
  </style>
</head>
<body>
  <div class="desktop">
    <!-- Terminal window -->
    <div class="terminal-window" id="terminal-window">
      <div class="window-header">
        <div class="traffic-lights">
          <span class="red"></span>
          <span class="yellow"></span>
          <span class="green"></span>
        </div>
        <div class="window-title">lain@seravyn-os: ~</div>
      </div>

      <div class="terminal-body" id="terminal-body">
        <div class="line">
lain@seravyn-os
user ^
os name: seravyn os
        </div>

        <div class="palette">
          <span class="p1"></span><span class="p2"></span><span class="p3"></span><span class="p4"></span>
          <span class="p5"></span><span class="p6"></span><span class="p7"></span><span class="p8"></span>
        </div>

        <div class="line hint">
Commands: serverdata, specs, neofetch, theme &lt;#rrggbb&gt;, clear, snake.
        </div>

        <div class="prompt-line" id="prompt-line">
          <span class="prompt-label" id="prompt-label">lain@seravyn-os:~$</span>
          <input id="terminal-input" autocomplete="off" autofocus />
        </div>
      </div>
    </div>

    <!-- Snake window -->
    <div class="snake-window" id="snake-window">
      <div class="window-header">
        <div class="traffic-lights">
          <span class="red"></span>
          <span class="yellow"></span>
          <span class="green"></span>
        </div>
        <div class="window-title">snake@seravyn-os: /usr/games/snake</div>
      </div>
      <div class="snake-body">
        <div class="snake-info">
          Arrow keys to move (<span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span>).
          Press <span class="key">Esc</span> to close the game window.
        </div>
        <canvas id="snake-canvas" width="400" height="400"></canvas>
        <div class="snake-footer" id="snake-footer">Score: 0</div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("terminal-input");
    const bodyEl = document.getElementById("terminal-body");
    const termWindow = document.getElementById("terminal-window");
    const promptLabel = document.getElementById("prompt-label");
    const snakeWindow = document.getElementById("snake-window");
    const snakeCanvas = document.getElementById("snake-canvas");
    const snakeFooter = document.getElementById("snake-footer");
    const ctx = snakeCanvas.getContext("2d");

    let accent = "#22c55e";
    updateTheme(accent);

    function addLine(text, cssColor) {
      const line = document.createElement("div");
      line.className = "line";
      if (cssColor) line.style.color = cssColor;
      line.textContent = text;
      bodyEl.insertBefore(line, document.getElementById("prompt-line"));
      bodyEl.scrollTop = bodyEl.scrollHeight;
    }

    function clearConsole() {
      const prompt = document.getElementById("prompt-line");
      bodyEl.innerHTML = "";
      bodyEl.appendChild(prompt);
    }

    function updateTheme(color) {
      accent = color;
      promptLabel.style.color = accent;
      document.querySelectorAll(".traffic-lights .green").forEach(e => e.style.background = accent);
      termWindow.style.borderColor = color + "80";
      snakeWindow.style.borderColor = color + "80";
    }

    function runSpecs() {
      const text =
`Seravyn!_OS 22.04 LTS  x86_64
Kernel 6.1.0-20-generic
Theme: Neon-Arc-Dark  GTK3
Terminal: WebTTY (demo)
GPU: WebGL Virtual Adapter
Memory: 500GB`;
      text.split("\n").forEach(line => addLine(line));
    }

    function runNeofetch() {
      const art = [
"                 .-'''-.                 ",
"               .'  _    \\                ",
"   _______    /   /` '.   \\   _______    ",
"  /   __  \\  .   |     \\  '  /   __  \\   ",
"  | ,_/  \\__) |   '      |  ' | ,_/  \\__) ",
",-./  )       \\    \\     / /,-./  )       ",
"\\  '_ '`)      `.   ` ..' / \\  '_ '`)     ",
" > (_)  )  __     '-...-'`   > (_)  )  __ ",
"(  .  .-'_/  )                (  .  .-'_/  )",
" `-'`-'     /                  `-'`-'     /",
"   `._____.'                    `._____.' "
      ];
      art.forEach(l => addLine(l, accent));
      addLine("");
      addLine("lain@seravyn-os", accent);
      addLine("---------------");
      addLine("OS: Seravyn!_OS 22.04 LTS x86_64");
      addLine("Host: seravyn-os");
      addLine("Kernel: 6.1.0-20-generic");
      addLine("Shell: websh 1.0");
      addLine("Resolution: 1920x1080");
      addLine("DE: seravyn-shell");
      addLine("Theme: Neon-Arc-Dark [GTK3]");
      addLine("Terminal: WebTTY");
      addLine("CPU: Virtual JS Engine");
      addLine("GPU: WebGL Virtual Adapter");
      addLine("Memory: 500GB");
    }

    input.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;

      const cmd = input.value.trim();
      addLine(promptLabel.textContent + " " + cmd);
      input.value = "";

      if (!cmd) return;

      const [base, arg] = cmd.split(/\s+/, 2);

      switch (base.toLowerCase()) {
        case "serverdata":
          window.location.href = "https://seravyn.online/serverdata";
          break;

        case "specs":
          runSpecs();
          break;

        case "neofetch":
          runNeofetch();
          break;

        case "theme":
          if (!arg) {
            addLine("usage: theme #rrggbb");
          } else {
            const color = arg.toLowerCase();
            const hexMatch = /^#([0-9a-f]{6})$/i;
            if (hexMatch.test(color)) {
              updateTheme(color);
              addLine("theme set to " + color);
            } else {
              addLine("invalid color. use #rrggbb");
            }
          }
          break;

        case "clear":
          clearConsole();
          break;

        case "snake":
          startSnakeGame();
          break;

        default:
          addLine("command not found: " + base);
      }
    });

    /* ===== Snake ===== */

    const gridSize = 20; // 20x20 grid
    const tileSize = snakeCanvas.width / gridSize;

    let snake, direction, nextDirection, food, snakeTimer, score, snakeRunning = false;

    function resetSnake() {
      snake = [{x:10, y:10}];
      direction = "right";
      nextDirection = "right";
      placeFood();
      score = 0;
      snakeFooter.textContent = "Score: " + score;
    }

    function placeFood() {
      let valid = false;
      while (!valid) {
        food = {
          x: Math.floor(Math.random() * gridSize),
          y: Math.floor(Math.random() * gridSize)
        };
        valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
      }
    }

    function drawSnake() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);

      // grid 
      ctx.strokeStyle = "rgba(15,23,42,0.9)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= gridSize; i++) {
        ctx.beginPath();
        ctx.moveTo(i * tileSize, 0);
        ctx.lineTo(i * tileSize, snakeCanvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * tileSize);
        ctx.lineTo(snakeCanvas.width, i * tileSize);
        ctx.stroke();
      }

      ctx.fillStyle = "#f97316";
      ctx.fillRect(food.x * tileSize, food.y * tileSize, tileSize, tileSize);

      // snake
      ctx.fillStyle = accent;
      snake.forEach((seg, idx) => {
        ctx.fillRect(seg.x * tileSize, seg.y * tileSize, tileSize, tileSize);
        if (idx === 0) {
          ctx.strokeStyle = "#0f172a";
          ctx.strokeRect(seg.x * tileSize + 1, seg.y * tileSize + 1, tileSize - 2, tileSize - 2);
        }
      });
    }

    function stepSnake() {
      if (!snakeRunning) return;

      direction = nextDirection;

      const head = {...snake[0]};
      if (direction === "right") head.x++;
      if (direction === "left") head.x--;
      if (direction === "up") head.y--;
      if (direction === "down") head.y++;

      if (
        head.x < 0 || head.x >= gridSize ||
        head.y < 0 || head.y >= gridSize ||
        snake.some(seg => seg.x === head.x && seg.y === head.y)
      ) {
        snakeRunning = false;
        clearInterval(snakeTimer);
        snakeFooter.textContent = "Game over — score: " + score + " (press snake again to restart)";
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        snakeFooter.textContent = "Score: " + score;
        placeFood();
      } else {
        snake.pop();
      }

      drawSnake();
    }

    function startSnakeGame() {
      snakeWindow.style.display = "flex";
      resetSnake();
      drawSnake();
      snakeRunning = true;
      clearInterval(snakeTimer);
      snakeTimer = setInterval(stepSnake, 120);
      snakeCanvas.focus();
    }
    
    window.addEventListener("keydown", (e) => {
      if (snakeWindow.style.display === "flex") {
        if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
          e.preventDefault();
          const dir = e.key;
          if (dir === "ArrowUp" && direction !== "down") nextDirection = "up";
          if (dir === "ArrowDown" && direction !== "up") nextDirection = "down";
          if (dir === "ArrowLeft" && direction !== "right") nextDirection = "left";
          if (dir === "ArrowRight" && direction !== "left") nextDirection = "right";
        }
        if (e.key === "Escape") {
          snakeWindow.style.display = "none";
          snakeRunning = false;
          clearInterval(snakeTimer);
        }
      }
    });
  </script>
</body>
</html>
